<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Visual Effects Demo</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .reel {
      display: inline-block;
      margin: 10px;
      padding: 20px;
      background: #222;
      border-radius: 10px;
      width: 80px;
      height: 80px;
      line-height: 40px;
    }

    .active {
      border: 2px solid yellow;
    }
  </style>
</head>

<body>

<h2>Slot Visual Effects Demo</h2>

<div id="game"></div>

<script>
  // --- MOCK SYMBOLS ---
  const symbols = {
    "2xBAR": { src: "2xBAR" },
    "3xBAR": { src: "3xBAR" }
  };

  const BARx2 = "BARx2";
  const BARx3 = "BARx3";

  // --- MOCK IMAGE FUNCTION ---
  function createImage({ content, width }) {
    return `<div class="reel">${content}</div>`;
  }

  // --- MOCK TWEEN SYSTEM ---
  function Tween(obj) {
    this.to = function () { return this; };
    this.easing = function () { return this; };
    this.repeat = function () { return this; };
    this.start = function () { return this; };
  }

  const Easing = {
    Cubic: { InOut: "inout" }
  };

  // --- GAME UI RENDER ---
  function render(parent) {
    let html = "";

    html += createImage({ content: BARx2, width: 80 });
    html += createImage({ content: BARx3, width: 80 });

    parent.innerHTML = html;
  }

  render(document.getElementById("game"));

  // --- VISUAL EFFECTS ---
  function VisualEffects(reels) {
    this.highlightBlock = (block, reelIndex) => {
      block.classList.add("active");

      setTimeout(() => {
        block.classList.remove("active");
      }, 300);
    };

    this.highlight = (blocks) => {
      for (const [reelIndex, block] of blocks.entries()) {
        this.highlightBlock(block, reelIndex);
      }
    };
  }

  // demo highlight
  const reels = document.querySelectorAll(".reel");
  const effects = new VisualEffects(reels);

  setTimeout(() => {
    effects.highlight([...reels]);
  }, 1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Sevens Fire</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: radial-gradient(circle, #2b0000, #000000);
  overflow:hidden;
}

/* FIRE BACKGROUND */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(45deg, red, orange, yellow);
  opacity:0.15;
  filter: blur(80px);
  animation: fireMove 5s infinite alternate;
}

@keyframes fireMove {
  0% { transform:translateY(0px);}
  100% { transform:translateY(-50px);}
}

.title {
  font-size:40px;
  margin:15px;
  color:#ffcc00;
  text-shadow:0 0 10px orange, 0 0 20px red, 0 0 40px yellow;
}

/* SLOT */
.slot {
  background:#4b0000;
  padding:15px;
  border-radius:20px;
  box-shadow:0 0 30px red;
}

.reels {
  display:flex;
  justify-content:space-between;
}

.reel {
  width:70px;
  height:150px;
  background:black;
  border:3px solid orange;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.reel img {
  width:60px;
  filter: drop-shadow(0 0 10px yellow);
}

/* PANELS */
.panel {
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
  width:30%;
  box-shadow:0 0 10px #ff6600;
}

/* BUTTONS */
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.spin { background:limegreen; }
.stop { background:red; color:white; }
.auto { background:orange; }

.big-btn {
  width:120px;
  height:120px;
  border-radius:50%;
  background:white;
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="title">🔥 HOT SEVENS 🔥</div>

<div class="slot">
  <div class="reels">
    <div class="reel"><img id="r1"></div>
    <div class="reel"><img id="r2"></div>
    <div class="reel"><img id="r3"></div>
    <div class="reel"><img id="r4"></div>
    <div class="reel"><img id="r5"></div>
  </div>
</div>

<div class="panel">
  <div class="box">CREDIT<br><span id="credit">1000</span></div>
  <div class="box">WIN<br><span id="win">0</span></div>
  <div class="box">BET<br><span id="bet">20</span></div>
</div>

<div>
  <button onclick="changeBet(-10)">- BET</button>
  <button onclick="changeBet(10)">+ BET</button>
  <button class="auto" onclick="autoSpin()">AUTO</button>
</div>

<button class="big-btn" onclick="spin()">SPIN</button>
<button class="stop" onclick="stopSpin()">STOP</button>

<script>
const symbols = [
  "https://i.imgur.com/1.png", // watermelon
  "https://i.imgur.com/2.png", // lemon
  "https://i.imgur.com/3.png", // cherry
  "https://i.imgur.com/4.png", // star
  "https://i.imgur.com/5.png", // seven
  "https://i.imgur.com/6.png"  // orange
];

let spinning=false;
let interval;
let credit=1000;
let bet=20;
let auto=false;

function rand(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function setImages(){
  for(let i=1;i<=5;i++){
    document.getElementById("r"+i).src = rand();
  }
}

function spin(){
  if(spinning || credit<bet) return;

  credit -= bet;
  update();

  spinning=true;

  interval=setInterval(setImages,100);

  if(auto){
    setTimeout(stopSpin,1500);
  }
}

function stopSpin(){
  clearInterval(interval);
  spinning=false;

  let imgs=[];
  for(let i=1;i<=5;i++){
    imgs.push(document.getElementById("r"+i).src);
  }

  let win=0;

  let count={};
  imgs.forEach(i=>count[i]=(count[i]||0)+1);

  for(let k in count){
    if(count[k]>=3){
      win = count[k]*bet;
    }
  }

  credit+=win;
  document.getElementById("win").innerText=win;
  update();
}

function changeBet(v){
  bet+=v;
  if(bet<10) bet=10;
  update();
}

function autoSpin(){
  auto=!auto;
  if(auto){
    let loop=setInterval(()=>{
      if(!auto){ clearInterval(loop); return;}
      spin();
    },2000);
  }
}

function update(){
  document.getElementById("credit").innerText=credit;
  document.getElementById("bet").innerText=bet;
}

setImages();
update();
</script>

</body>
</html>

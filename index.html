<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.">
    <title>Blur Glass Saytı</title>
    <style>
        body {
            margin: ;
            padding: ;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('https://source.unsplash.com/random/192x108') no-repeat center center/cover;
            filter: blur(5px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
            color: #fff;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, .5);
            border-radius: 5px;
            transition: background .3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, .3);
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            color: #fff;
        }

        h1 {
            margin: ;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            margin: 20px ;
        }

        footer {
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Salam, Düya!</h1>
        <nav>
            <a href="#">Ana Səhifə</a>
            <a href="#">Haqqında</a>
            <a href="#">Əlaqə</a>
        </nav>
    </header>
    <div class="container">
        <div class="content">
            <h1>Modern Dizayn</h1>
            <p>Bu, "blur glass" effektini istifadə edərək yaradılmış müasir bir saytdır.</p>
        </div>
    </div>
    <footer>
        &copy; 2023 - Harada ola bilərsən?
    </footer>
</body>
</html>

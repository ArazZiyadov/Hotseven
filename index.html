<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Sevens Pro</title>

<style>
body {
  margin:0;
  background:#0b0b0b;
  font-family: Arial;
  color:white;
  text-align:center;
}

.topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:black;
  font-size:14px;
}

.jackpot { color:red; }
.bonus { color:#00ff88; }

.title {
  font-size:30px;
  color:gold;
  margin:10px;
}

.slot {
  background:#5a0000;
  margin:10px;
  padding:10px;
  border-radius:15px;
}

.reels {
  display:flex;
  justify-content:space-between;
}

.reel {
  width:60px;
  height:150px;
  background:#111;
  border:2px solid orange;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:35px;
}

.panel {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
  width:30%;
}

.controls {
  margin-top:15px;
}

button {
  padding:12px;
  border:none;
  border-radius:12px;
  margin:5px;
  font-size:14px;
}

.spin { background:green; color:white; }
.stop { background:red; color:white; }
.auto { background:#ffaa00; }
.bet { background:#444; color:white; }

.big-btn {
  margin-top:15px;
  background:white;
  color:black;
  font-size:20px;
  width:120px;
  height:120px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="jackpot">JACKPOT: <span id="jackpot">150.00</span> AZN</div>
  <div class="bonus">BONUS: <span id="bonus">100.00</span> AZN</div>
</div>

<div class="title">🔥 Hot Sevens</div>

<div class="slot">
  <div class="reels">
    <div class="reel" id="r1">🍉</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">🍒</div>
    <div class="reel" id="r4">⭐</div>
    <div class="reel" id="r5">7️⃣</div>
  </div>
</div>

<div class="panel">
  <div class="box">
    CREDIT<br>
    <span id="credit">1000</span>
  </div>
  <div class="box">
    WIN<br>
    <span id="win">0</span>
  </div>
  <div class="box">
    BET<br>
    <span id="bet">20</span>
  </div>
</div>

<div class="controls">
  <button class="bet" onclick="changeBet(-10)">- BET</button>
  <button class="bet" onclick="changeBet(10)">+ BET</button>
  <button class="auto" onclick="autoSpin()">AUTO</button>
</div>

<button class="big-btn" onclick="spin()">SPIN</button>
<button class="stop" onclick="stopSpin()">STOP</button>

<script>
const symbols = ["🍉","🍋","🍒","⭐","7️⃣","🍊"];

let spinning=false;
let interval;
let credit=1000;
let bet=20;
let auto=false;

function rand() {
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function updateUI() {
  document.getElementById("credit").innerText=credit;
  document.getElementById("bet").innerText=bet;
}

function spin() {
  if (spinning || credit < bet) return;

  credit -= bet;
  updateUI();

  spinning=true;

  interval=setInterval(()=>{
    for(let i=1;i<=5;i++){
      document.getElementById("r"+i).innerText=rand();
    }
  },100);

  if(auto){
    setTimeout(stopSpin,1500);
  }
}

function stopSpin(){
  if(!spinning) return;
  clearInterval(interval);
  spinning=false;

  let vals=[];
  for(let i=1;i<=5;i++){
    vals.push(document.getElementById("r"+i).innerText);
  }

  let win=0;

  // sadə uduş sistemi
  let counts={};
  vals.forEach(v=>counts[v]=(counts[v]||0)+1);

  for(let k in counts){
    if(counts[k]>=3){
      win = counts[k]*bet;
    }
  }

  // JACKPOT (5 eyni)
  if(Object.values(counts).includes(5)){
    win = 500;
    alert("JACKPOT!!!");
  }

  credit += win;
  document.getElementById("win").innerText=win;

  updateUI();
}

function changeBet(val){
  bet += val;
  if(bet<10) bet=10;
  updateUI();
}

function autoSpin(){
  auto=!auto;
  if(auto){
    let loop=setInterval(()=>{
      if(!auto){ clearInterval(loop); return; }
      spin();
    },2000);
  }
}

// fake jackpot/bonus artımı
setInterval(()=>{
  let j = parseFloat(document.getElementById("jackpot").innerText);
  let b = parseFloat(document.getElementById("bonus").innerText);

  j += Math.random();
  b += Math.random();

  document.getElementById("jackpot").innerText=j.toFixed(2);
  document.getElementById("bonus").innerText=b.toFixed(2);
},2000);

updateUI();
</script>

</body>
</html>

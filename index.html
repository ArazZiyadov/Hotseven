<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Sevens Slot Machine</title>
    <style>
        body {
            background-color: #0a0a1a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .slot-machine {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.3);
            width: 800px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            color: #ff9900;
            text-shadow: 0 0 10px #ff6600;
        }
        
        .game-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .paylines {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }
        
        .payline {
            background: linear-gradient(to right, #ff3300, #ff9900);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            min-width: 30px;
        }
        
        .reels {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
        }
        
        .reel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        
        .symbol {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            background: radial-gradient(circle, #333, #111);
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }
        
        .controls {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .info-panel {
            display: flex;
            gap: 20px;
        }
        
        .info-box {
            background: linear-gradient(to bottom, #222, #111);
            padding: 10px 15px;
            border-radius: 8px;
            min-width: 120px;
            text-align: center;
        }
        
        .info-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        
        .jackpot {
            color: #ffcc00;
        }
        
        .bonus {
            color: #00ffcc;
        }
        
        .spin-button {
            background: linear-gradient(to bottom, #44cc44, #228822);
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
            transition: all 0.3s;
        }
        
        .spin-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 255, 0, 0.5);
        }
        
        .spin-button:active {
            transform: scale(0.95);
        }
        
        .game-over {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            color: #ff9900;
            font-weight: bold;
        }
        
        .star {
            color: gold;
            text-shadow: 0 0 10px #ffcc00;
        }
        
        .hot-sevens {
            color: #ff3300;
            text-shadow: 0 0 10px #ff0000;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="slot-machine">
        <div class="title">SlotCatalog</div>
        
        <div class="game-area">
            <div class="paylines">
                <div class="payline">4</div>
                <div class="payline">2</div>
                <div class="payline">8</div>
                <div class="payline">6</div>
                <div class="payline hot-sevens">Hot Sevens</div>
                <div class="payline">10</div>
                <div class="payline">1</div>
                <div class="payline">7</div>
                <div class="payline">9</div>
                <div class="payline">3</div>
                <div class="payline">5</div>
            </div>
            
            <div class="reels">
                <div class="reel">
                    <div class="symbol">🍇</div>
                    <div class="symbol">🍇</div>
                    <div class="symbol star">★</div>
                </div>
                <div class="reel">
                    <div class="symbol">🍒</div>
                    <div class="symbol">🍒</div>
                    <div class="symbol">🍒</div>
                </div>
                <div class="reel">
                    <div class="symbol">🍇</div>
                    <div class="symbol">🍋</div>
                    <div class="symbol">🍋</div>
                </div>
                <div class="reel">
                    <div class="symbol">🍊</div>
                    <div class="symbol">🍊</div>
                    <div class="symbol">🍊</div>
                </div>
                <div class="reel">
                    <div class="symbol">🫐</div>
                    <div class="symbol">🫐</div>
                    <div class="symbol">🍋</div>
                </div>
            </div>
            
            <div class="paylines">
                <div class="payline">4</div>
                <div class="payline">2</div>
                <div class="payline">8</div>
                <div class="payline">6</div>
                <div class="payline">10</div>
                <div class="payline">1</div>
                <div class="payline">7</div>
                <div class="payline">9</div>
                <div class="payline">3</div>
                <div class="payline">5</div>
                <div class="payline">11</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="info-panel">
                <div class="info-box">
                    <div class="info-label">CREDIT</div>
                    <div class="info-value">10,000.00</div>
                </div>
                <div class="info-box">
                    <div class="info-label">LINES</div>
                    <div class="info-value">10</div>
                </div>
                <div class="info-box">
                    <div class="info-label">BET</div>
                    <div class="info-value">10</div>
                </div>
                <div class="info-box">
                    <div class="info-label">WIN</div>
                    <div class="info-value">0</div>
                </div>
            </div>
            
            <button class="spin-button">START</button>
        </div>
        
        <div class="game-over">GAME OVER, PLACE YOUR BET</div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 15px; font-weight: bold;">
            <div class="jackpot">JACKPOT 151,092.56 fun</div>
            <div class="bonus">BONUS 226,578.84 fun</div>
        </div>
    </div>
</body>
</html>

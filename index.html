<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Sevens Slot</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

.title {
  font-size: 28px;
  color: gold;
  margin: 10px 0;
}

.reels {
  display: flex;
  justify-content: space-between;
  background: darkred;
  padding: 10px;
  border-radius: 10px;
}

.reel {
  width: 60px;
  height: 120px;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  border: 2px solid orange;
  border-radius: 10px;
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

.spin {
  background: green;
  color: white;
}

.stop {
  background: red;
  color: white;
}

.info {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🔥 Hot Sevens</div>

  <div class="reels">
    <div class="reel" id="r1">🍉</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">⭐</div>
    <div class="reel" id="r4">🍒</div>
    <div class="reel" id="r5">7️⃣</div>
  </div>

  <div class="controls">
    <button class="spin" onclick="spin()">SPIN</button>
    <button class="stop" onclick="stopSpin()">STOP</button>
  </div>

  <div class="info">
    Kredit: <span id="credit">100</span><br>
    Uduş: <span id="win">0</span>
  </div>
</div>

<script>
const symbols = ["🍉","🍋","🍒","⭐","7️⃣","🍊"];
let spinning = false;
let interval;

function randomSymbol() {
  return symbols[Math.floor(Math.random() * symbols.length)];
}

function spin() {
  if (spinning) return;
  spinning = true;

  interval = setInterval(() => {
    for (let i = 1; i <= 5; i++) {
      document.getElementById("r" + i).innerText = randomSymbol();
    }
  }, 100);
}

function stopSpin() {
  spinning = false;
  clearInterval(interval);

  // sadə uduş yoxlaması
  let values = [];
  for (let i = 1; i <= 5; i++) {
    values.push(document.getElementById("r" + i).innerText);
  }

  let win = 0;
  if (values.every(v => v === values[0])) {
    win = 50;
  }

  document.getElementById("win").innerText = win;
}
</script>

</body>
</html>

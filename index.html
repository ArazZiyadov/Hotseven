<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Sevens MAX</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#2b0000,#000);
  color:white;
  text-align:center;
  overflow:hidden;
}

/* FIRE BG */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(45deg, red, orange, yellow);
  opacity:0.1;
  filter: blur(100px);
  animation: fire 6s infinite alternate;
}

@keyframes fire {
  from { transform:translateY(0); }
  to { transform:translateY(-60px); }
}

.title {
  font-size:40px;
  margin:15px;
  color:gold;
  text-shadow:0 0 10px orange,0 0 30px red;
}

/* SLOT */
.slot {
  background:#4b0000;
  margin:10px;
  padding:15px;
  border-radius:20px;
  box-shadow:0 0 25px red;
}

.reels {
  display:flex;
  justify-content:space-between;
}

.reel {
  width:70px;
  height:150px;
  overflow:hidden;
  border:3px solid orange;
  border-radius:15px;
  background:black;
  position:relative;
}

.strip {
  position:absolute;
  width:100%;
}

.strip img {
  width:65px;
  margin:5px 0;
  filter: drop-shadow(0 0 10px yellow);
}

/* PANEL */
.panel {
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
  width:30%;
  box-shadow:0 0 10px orange;
}

/* BUTTON */
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

.spin { background:limegreen; }
.stop { background:red; color:white; }
.auto { background:orange; }

.big {
  width:120px;
  height:120px;
  border-radius:50%;
  font-size:20px;
  background:white;
}

/* WIN EFFECT */
.winFlash {
  animation: flash 0.3s 6;
}

@keyframes flash {
  0%{background:red;}
  50%{background:yellow;}
  100%{background:red;}
}
</style>
</head>

<body>

<div class="title">🔥 HOT SEVENS 🔥</div>

<div class="slot">
  <div class="reels">
    <div class="reel"><div class="strip" id="s1"></div></div>
    <div class="reel"><div class="strip" id="s2"></div></div>
    <div class="reel"><div class="strip" id="s3"></div></div>
    <div class="reel"><div class="strip" id="s4"></div></div>
    <div class="reel"><div class="strip" id="s5"></div></div>
  </div>
</div>

<div class="panel">
  <div class="box">CREDIT<br><span id="credit">1000</span></div>
  <div class="box">WIN<br><span id="win">0</span></div>
  <div class="box">BET<br><span id="bet">20</span></div>
</div>

<div>
  <button onclick="changeBet(-10)">- BET</button>
  <button onclick="changeBet(10)">+ BET</button>
  <button class="auto" onclick="autoSpin()">AUTO</button>
</div>

<button class="big" onclick="spin()">SPIN</button>
<button class="stop" onclick="stopSpin()">STOP</button>

<!-- SOUND -->
<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2764/2764-preview.mp3"></audio>

<script>
const symbols = [
 "https://cdn-icons-png.flaticon.com/512/590/590685.png",
 "https://cdn-icons-png.flaticon.com/512/135/135620.png",
 "https://cdn-icons-png.flaticon.com/512/590/590772.png",
 "https://cdn-icons-png.flaticon.com/512/590/590749.png",
 "https://cdn-icons-png.flaticon.com/512/188/188987.png",
 "https://cdn-icons-png.flaticon.com/512/616/616494.png"
];

let credit=1000, bet=20;
let spinning=false, auto=false;
let speeds=[];

/* CREATE STRIPS */
function createStrip(id){
  let strip=document.getElementById(id);
  for(let i=0;i<20;i++){
    let img=document.createElement("img");
    img.src = symbols[Math.floor(Math.random()*symbols.length)];
    strip.appendChild(img);
  }
}
for(let i=1;i<=5;i++) createStrip("s"+i);

function spin(){
  if(spinning || credit<bet) return;

  document.getElementById("spinSound").play();
  credit-=bet; update();

  spinning=true;
  speeds=[20,22,24,26,28];

  animate();
}

function animate(){
  if(!spinning) return;

  for(let i=1;i<=5;i++){
    let strip=document.getElementById("s"+i);
    let top = strip.offsetTop + speeds[i-1];
    strip.style.top = (top % 300) + "px";
  }

  requestAnimationFrame(animate);
}

function stopSpin(){
  spinning=false;

  let result=[];
  for(let i=1;i<=5;i++){
    let imgs=document.querySelectorAll("#s"+i+" img");
    let r = Math.floor(Math.random()*imgs.length);
    result.push(imgs[r].src);
  }

  let count={};
  result.forEach(v=>count[v]=(count[v]||0)+1);

  let win=0;
  for(let k in count){
    if(count[k]>=3){
      win = count[k]*bet;
    }
  }

  if(win>0){
    document.body.classList.add("winFlash");
    document.getElementById("winSound").play();
    setTimeout(()=>document.body.classList.remove("winFlash"),1000);
  }

  credit+=win;
  document.getElementById("win").innerText=win;
  update();
}

function changeBet(v){
  bet+=v;
  if(bet<10) bet=10;
  update();
}

function autoSpin(){
  auto=!auto;
  if(auto){
    let loop=setInterval(()=>{
      if(!auto){clearInterval(loop);return;}
      spin();
      setTimeout(stopSpin,1500);
    },2500);
  }
}

function update(){
  document.getElementById("credit").innerText=credit;
  document.getElementById("bet").innerText=bet;
}
</script>

</body>
</html>
